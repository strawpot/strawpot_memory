name: Release and Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "strawpot_memory/**"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 0.3.0). Leave empty for auto patch bump."
        required: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(git tag --list 'v*' --sort=-v:refname | head -n1)
            if [ -z "$LATEST" ]; then
              echo "version=0.1.0" >> "$GITHUB_OUTPUT"
              echo "tag=v0.1.0" >> "$GITHUB_OUTPUT"
            else
              MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
              MINOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f2)
              PATCH=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f3)
              NEW_PATCH=$((PATCH + 1))
              echo "version=${MAJOR}.${MINOR}.${NEW_PATCH}" >> "$GITHUB_OUTPUT"
              echo "tag=v${MAJOR}.${MINOR}.${NEW_PATCH}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        run: gh release create "${{ steps.version.outputs.tag }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
